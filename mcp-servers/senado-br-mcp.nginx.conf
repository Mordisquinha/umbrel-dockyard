server {
    listen 8000;
    server_name _;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok\n";
    }

    location /mcp {
        proxy_pass https://senado.sidneybissoli.com;
        proxy_http_version 1.1;
        proxy_ssl_server_name on;
        proxy_ssl_name senado.sidneybissoli.com;
        proxy_set_header Host senado.sidneybissoli.com;
        proxy_set_header Connection "";
        proxy_buffering off;
        proxy_request_buffering off;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;
    }
}
