version: "3.7"
services:
  app_proxy:
    restart: always
    environment:
      APP_HOST: Ollama
      APP_PORT: 11434
      PROXY_AUTH_ADD: "false"
    container_name: Ollama-Proxy
    volumes:
      - /c/umbrel:/shared
  ollama:
    image: ollama/ollama:0.31.1@sha256:f1a705f2bd113fb8d15f85f7c217f0dc5f6bebda6b0cc42b82c3ad165ffcb9dc
    environment:
      OLLAMA_ORIGINS: "*"
      # 32k fits Hermes' current prompt while remaining viable on this host.
      OLLAMA_CONTEXT_LENGTH: 32768
    volumes:
      - ${APP_DATA_DIR}/data:/root/.ollama
      - C:\SecondBrain:/SecondBrain
      - /c/umbrel:/shared
    restart: always
    container_name: Ollama
